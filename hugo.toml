baseURL = "https://jupiter263.github.io/Jovian/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = true
title = "Jovian"
hasCJKLanguage = true
[languages]
[languages.zh-cn]
    languageName = "中文"
    title = "Jovian"
    weight = 1
    contentDir = "content"
    [languages.zh-cn.params]
        mainSections = ["post"]

[languages.en]
    languageName = "English"
    title = "Jovian"
    weight = 2
    contentDir = "content/en"
    [languages.en.params]
        mainSections = ["post"]

[languages.ja]
    languageName = "日本語"
    title = "Jovian"
    weight = 3
    contentDir = "content/ja"
    hasCJKLanguage = true
    [languages.ja.params]
        mainSections = ["post"]

[permalinks]
    [languages.en.permalinks]
    post = "/p/:slug/"

    [languages.zh-cn.permalinks]
    post = "/p/:slug/"

    [languages.ja.permalinks]
    post = "/p/:slug/"

[params]
  featuredImageField = "image"
  rssFullContent = true

  [params.sidebar]
    emoji = "🪐"
    subtitle = "Jupiter's notes"

  [params.article]
    toc = true

[module]
  [[module.imports]]
    path = "github.com/CaiJimmy/hugo-theme-stack/v4"